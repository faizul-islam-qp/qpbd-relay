services:
  postgres:
    image: postgres:16-alpine
    container_name: wick-postgres
    environment:
      POSTGRES_USER: wick
      POSTGRES_PASSWORD: wick
      POSTGRES_DB: wick_office
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wick -d wick_office"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - wick-network

  backend:
    build:
      context: .
      dockerfile: devops/backend/Dockerfile
    container_name: wick-backend
    ports:
      - "3001:3001"
    env_file:
      - .env.docker
    environment:
      DATABASE_URL: postgresql://wick:wick@postgres:5432/wick_office
      NODE_ENV: development
      NODE_OPTIONS: "--dns-result-order=ipv4first"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/backend:/app
      - /app/node_modules
    networks:
      - wick-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: devops/frontend/Dockerfile
    container_name: wick-frontend
    ports:
      - "3000:3000"
    environment:
      API_TARGET: http://backend:3001
      NODE_ENV: development
    depends_on:
      - backend
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
    networks:
      - wick-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  wick-network:
    driver: bridge
